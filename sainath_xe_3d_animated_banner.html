
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

  .banner-wrap {
    width: 100%;
    background: #020b1a;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    font-family: 'JetBrains Mono', monospace;
    min-height: 320px;
  }

  canvas#stars {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  .city-layer {
    position: absolute;
    bottom: 0;
    width: 100%;
    pointer-events: none;
  }

  .content-layer {
    position: relative;
    z-index: 10;
    padding: 32px 36px 28px;
    min-height: 320px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .prompt-line {
    font-size: 13px;
    color: #38bdf8;
    opacity: 0.8;
    animation: blink-cursor 1s step-end infinite;
  }

  @keyframes blink-cursor {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 0.3; }
  }

  .name-3d {
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 800;
    line-height: 1;
    position: relative;
    display: inline-block;
    letter-spacing: -1px;
    color: #fff;
    text-shadow:
      0 1px 0 #c8d0e0,
      0 2px 0 #b0b8cc,
      0 3px 0 #9aa3bb,
      0 4px 0 #8490ab,
      0 5px 0 #6e7d9b,
      0 6px 0 #596a8b,
      0 7px 0 #44577b,
      0 8px 0 #2f446b,
      0 9px 0 #1a315b;
    animation: float3d 4s ease-in-out infinite;
    background: linear-gradient(135deg, #ffffff 0%, #7dd3fc 40%, #818cf8 80%, #a78bfa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 12px 24px rgba(56, 189, 248, 0.35));
  }

  @keyframes float3d {
    0%, 100% { transform: translateY(0px) rotateX(0deg); }
    25% { transform: translateY(-4px) rotateX(2deg); }
    75% { transform: translateY(2px) rotateX(-1deg); }
  }

  .name-shadow-layer {
    position: absolute;
    top: 10px;
    left: 1px;
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 800;
    color: transparent;
    opacity: 0.18;
    background: linear-gradient(135deg, #818cf8, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: blur(6px);
    pointer-events: none;
    animation: float3d 4s ease-in-out infinite;
    animation-delay: 0.1s;
  }

  .name-wrapper {
    position: relative;
    margin-bottom: 8px;
  }

  .tagline {
    font-size: 13px;
    color: #7dd3fc;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 4px;
    opacity: 0.9;
  }

  .roles-line {
    font-size: 12px;
    color: #94a3b8;
    letter-spacing: 1px;
  }

  .roles-line span {
    color: #818cf8;
  }

  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 20px;
  }

  .mantra-box {
    border: 1px solid rgba(129,140,248,0.4);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 11px;
    letter-spacing: 2px;
    color: #818cf8;
    background: rgba(30, 27, 75, 0.5);
    animation: glow-pulse 3s ease-in-out infinite;
  }

  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 8px rgba(129,140,248,0.2); }
    50% { box-shadow: 0 0 20px rgba(129,140,248,0.5), 0 0 40px rgba(56,189,248,0.15); }
  }

  .clock-box {
    font-size: 16px;
    font-weight: 700;
    color: #38bdf8;
    background: rgba(2, 11, 26, 0.8);
    border: 1px solid rgba(56,189,248,0.3);
    border-radius: 6px;
    padding: 6px 14px;
    letter-spacing: 2px;
    animation: clock-glow 2s ease-in-out infinite;
  }

  @keyframes clock-glow {
    0%, 100% { box-shadow: 0 0 6px rgba(56,189,248,0.3); }
    50% { box-shadow: 0 0 16px rgba(56,189,248,0.6); }
  }

  .typing-text {
    font-size: 12px;
    color: #38bdf8;
    overflow: hidden;
    white-space: nowrap;
    border-right: 2px solid #38bdf8;
    width: 0;
    animation: type-in 2.5s steps(22, end) 0.5s forwards, blink-bar 0.8s step-end infinite;
    display: inline-block;
  }

  @keyframes type-in {
    from { width: 0; }
    to { width: 22ch; }
  }

  @keyframes blink-bar {
    0%, 100% { border-color: #38bdf8; }
    50% { border-color: transparent; }
  }

  .scanline {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.06) 2px,
      rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 5;
  }

  .corner-deco {
    position: absolute;
    top: 12px; right: 16px;
    font-size: 10px;
    color: rgba(129,140,248,0.5);
    letter-spacing: 1px;
    font-family: 'JetBrains Mono', monospace;
    z-index: 15;
  }

  .status-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #22c55e;
    margin-right: 6px;
    animation: dot-blink 2s ease-in-out infinite;
    vertical-align: middle;
  }

  @keyframes dot-blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>

<div class="banner-wrap" id="banner">
  <canvas id="stars"></canvas>
  <canvas id="city"></canvas>
  <div class="scanline"></div>
  <div class="corner-deco"><span class="status-dot"></span>v2.0.26 · ONLINE</div>

  <div class="content-layer">
    <div>
      <div class="prompt-line">&gt;_ sainath.xe</div>
      <div style="height:10px"></div>
      <div class="name-wrapper">
        <div class="name-shadow-layer" aria-hidden="true">SAINATH MOGILI</div>
        <div class="name-3d">SAINATH MOGILI</div>
      </div>
      <div class="tagline">Software · Backend · AI/ML Engineer</div>
      <div class="roles-line">
        <span class="typing-text">Code. • Create. • Repeat.</span>
      </div>
    </div>

    <div class="bottom-bar">
      <div class="mantra-box">BUILD &nbsp;•&nbsp; SOLVE &nbsp;•&nbsp; REPEAT &nbsp;&lt;/&gt;</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div style="font-size:10px;color:#475569;font-family:'JetBrains Mono',monospace;">github.com/mogilisainath</div>
        <div class="clock-box" id="clock">22:30</div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  // Live clock
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('clock').textContent = h + ':' + m;
  }
  updateClock();
  setInterval(updateClock, 30000);

  // Stars canvas
  const starsCanvas = document.getElementById('stars');
  const sc = starsCanvas.getContext('2d');
  const banner = document.getElementById('banner');

  function resizeCanvases() {
    starsCanvas.width = banner.offsetWidth;
    starsCanvas.height = banner.offsetHeight;
    cityCanvas.width = banner.offsetWidth;
    cityCanvas.height = banner.offsetHeight;
    drawCity();
  }

  // Generate stars
  const stars = Array.from({length: 90}, () => ({
    x: Math.random(),
    y: Math.random() * 0.6,
    r: Math.random() * 1.4 + 0.3,
    twinkle: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.02 + 0.01
  }));

  function drawStars(t) {
    sc.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
    stars.forEach(s => {
      const alpha = 0.5 + 0.5 * Math.sin(s.twinkle + t * s.speed);
      sc.beginPath();
      sc.arc(s.x * starsCanvas.width, s.y * starsCanvas.height, s.r, 0, Math.PI * 2);
      const isBlue = Math.random() > 0.85;
      sc.fillStyle = `rgba(${isBlue ? '56,189,248' : '255,255,255'},${alpha.toFixed(2)})`;
      sc.fill();
    });
  }

  // City skyline canvas
  const cityCanvas = document.createElement('canvas');
  cityCanvas.style.cssText = 'position:absolute;bottom:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;';
  banner.insertBefore(cityCanvas, banner.querySelector('.scanline'));
  const cc = cityCanvas.getContext('2d');

  function pixelRect(ctx, x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
  }

  function drawBuilding(ctx, x, baseY, w, h, color, windows) {
    pixelRect(ctx, x, baseY - h, w, h, color);
    if (windows) {
      const ww = 3, wh = 4, gap = 7;
      for (let row = 0; row < Math.floor(h / 12); row++) {
        for (let col = 0; col < Math.floor(w / gap); col++) {
          if (Math.random() > 0.35) {
            const lit = Math.random() > 0.3;
            ctx.fillStyle = lit ? `rgba(255,220,100,${0.4 + Math.random()*0.5})` : `rgba(20,30,60,0.8)`;
            ctx.fillRect(
              Math.round(x + 3 + col * gap),
              Math.round(baseY - h + 6 + row * 12),
              ww, wh
            );
          }
        }
      }
    }
  }

  let buildingData = null;

  function generateBuildings(W, H) {
    const buildings = [];
    const baseY = H;
    const colors = ['#0f1c33','#0a1628','#081220','#0d1a2e','#111f38','#091422'];

    let x = -10;
    while (x < W + 20) {
      const w = Math.round(18 + Math.random() * 48);
      const h = Math.round(40 + Math.random() * (H * 0.55));
      buildings.push({ x, baseY, w, h, color: colors[Math.floor(Math.random()*colors.length)] });
      x += w + Math.round(Math.random() * 8 - 2);
    }
    return buildings;
  }

  function drawCity() {
    const W = cityCanvas.width;
    const H = cityCanvas.height;
    cc.clearRect(0, 0, W, H);

    if (!buildingData || buildingData.W !== W) {
      buildingData = { W, buildings: generateBuildings(W, H) };
    }

    // Horizon glow
    const grad = cc.createLinearGradient(0, H * 0.45, 0, H);
    grad.addColorStop(0, 'rgba(180,60,20,0)');
    grad.addColorStop(0.4, 'rgba(180,60,20,0.08)');
    grad.addColorStop(0.75, 'rgba(210,80,20,0.18)');
    grad.addColorStop(1, 'rgba(220,90,20,0.28)');
    cc.fillStyle = grad;
    cc.fillRect(0, 0, W, H);

    buildingData.buildings.forEach(b => {
      drawBuilding(cc, b.x, b.baseY, b.w, b.h, b.color, true);
    });

    // Ground strip
    const gGrad = cc.createLinearGradient(0, H - 18, 0, H);
    gGrad.addColorStop(0, '#060e1c');
    gGrad.addColorStop(1, '#02060f');
    cc.fillStyle = gGrad;
    cc.fillRect(0, H - 18, W, 18);
  }

  resizeCanvases();

  // Animate
  let t = 0;
  function animate() {
    t += 1;
    drawStars(t);
    requestAnimationFrame(animate);
  }
  animate();

  window.addEventListener('resize', () => {
    buildingData = null;
    resizeCanvases();
  });
})();
</script>
